<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AAGHAAZ - Where Gamers Unite. Pakistan's premier esports platform.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AAGHAAZ">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D0D">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>AAGHAAZ</title>
  <style>
    body { margin: 0; padding: 0; background: #0D0D0D; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0D0D0D; }
    .loader { width: 48px; height: 48px; border: 3px solid #1A1A1A; border-top-color: #6366F1; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
  </div>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      document.getElementById('loading').remove();
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: flutterServiceWorkerVersion,
        }
      });
    });
  </script>
</body>
</html>
